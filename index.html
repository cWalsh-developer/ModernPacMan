<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Pac-Man</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1>MODERN PAC-MAN</h1>
            <div class="game-info">
                <div class="info-item">
                    <span class="label">SCORE:</span>
                    <span id="score" class="value">0</span>
                </div>
                <div class="info-item">
                    <span class="label">LEVEL:</span>
                    <span id="level" class="value">1</span>
                </div>
                <div class="info-item">
                    <span class="label">LIVES:</span>
                    <span id="lives" class="value">3</span>
                </div>
                <div class="info-item">
                    <span class="label">HIGH SCORE:</span>
                    <span id="highscore" class="value">0</span>
                </div>
            </div>
        </div>
        
        <div class="power-ups-display">
            <div id="splitPowerStatus" class="power-status">
                <span class="power-label">SPLIT POWER:</span>
                <span class="power-value">OFF</span>
            </div>
            <div id="inverseModeStatus" class="power-status">
                <span class="power-label">INVERSE MODE:</span>
                <span class="power-value">OFF</span>
            </div>
            <div id="teleportMode" class="power-status">
                <span class="power-label">TELEPORT:</span>
                <span class="power-value">NORMAL</span>
            </div>
        </div>
        
        <canvas id="gameCanvas"></canvas>
        
        <div class="controls">
            <h3>CONTROLS</h3>
            <p><strong>Arrow Keys:</strong> Move Pac-Man</p>
            <p><strong>SPACE:</strong> Activate Split Power (when available)</p>
            <p><strong>P:</strong> Pause Game</p>
            <p><strong>R:</strong> Restart Game</p>
            <p><strong>M:</strong> Mute/Unmute Sound</p>
        </div>
        
        <div id="gameMessage" class="game-message hidden">
            <div class="message-content">
                <h2 id="messageTitle">READY!</h2>
                <p id="messageText">Press any key to start</p>
            </div>
        </div>
    </div>
    
    <script src="game.js"></script>
</body>
</html>
